version: '3.9'

services:
  api:
    container_name: wahagi-api
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3021}:3000"
    environment:
      # External PostgreSQL connection (update with your actual credentials)
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:changeme@your-db-host:5432/wahagi}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PORT: 3000
      HOST: 0.0.0.0
      MEDIA_DIR: /data/media
      AUTH_DIR: /data/auth
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      MEDIA_SEND_DELAY_MIN: ${MEDIA_SEND_DELAY_MIN:-500}
      MEDIA_SEND_DELAY_MAX: ${MEDIA_SEND_DELAY_MAX:-1000}
      WEBHOOK_RETRY_COUNT: ${WEBHOOK_RETRY_COUNT:-3}
      WEBHOOK_RETRY_DELAY: ${WEBHOOK_RETRY_DELAY:-2000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    volumes:
      - media_data:/data/media
      - auth_data:/data/auth
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"

volumes:
  media_data:
  auth_data:
